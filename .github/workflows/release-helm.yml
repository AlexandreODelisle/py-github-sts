---
name: Release Helm Chart

on:
  push:
    tags: ["github-sts-chart-v*"]

permissions: {}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint the Helm chart before publishing
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Lint chart
        run: helm lint charts/github-sts --strict

  # ─────────────────────────────────────────────────────────────────────────
  # Package and push Helm chart as OCI artifact to GHCR
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CHART_PATH: charts/github-sts
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: helm package "${{ env.CHART_PATH }}"

      - name: Push chart to GHCR
        run: |
          CHART_VERSION=$(grep '^version:' "${{ env.CHART_PATH }}/Chart.yaml" | awk '{print $2}')
          helm push "github-sts-${CHART_VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"

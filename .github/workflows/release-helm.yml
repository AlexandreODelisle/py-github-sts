---
name: Release Helm

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Helm release tag (e.g., github-sts-chart-v1.2.3)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Helm release tag (e.g., github-sts-chart-v1.2.3)"
        required: true
        type: string

permissions: {}

jobs:
  helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      REGISTRY: ghcr.io
      OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/charts
      CHART_DIR: charts/github-sts
      TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false

      - name: Validate chart files
        run: |
          test -f "${CHART_DIR}/Chart.yaml"

      - name: Compute version
        id: version
        run: |
          TAG="${{ env.TAG_NAME }}"
          if [[ "$TAG" == *-v* ]]; then
            VERSION="${TAG##*-v}"
          else
            VERSION="${TAG#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: |
          helm dependency update "${CHART_DIR}"
          helm package "${CHART_DIR}" --version "${{ steps.version.outputs.version }}" --destination .

      - name: Push chart
        run: |
          helm push github-sts-${{ steps.version.outputs.version }}.tgz "${OCI_REPO}"

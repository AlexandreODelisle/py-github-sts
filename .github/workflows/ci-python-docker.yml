---
name: "CI Python and Docker"

on:
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - pyproject.toml
      - README.md
      - src/**
      - tests/**
      - config/**
      - .github/workflows/ci-python-docker.yml
  push:
    branches: [main]
    paths:
      - Dockerfile
      - pyproject.toml
      - README.md
      - src/**
      - tests/**
      - config/**
      - .github/workflows/ci-python-docker.yml
  workflow_call: {}

concurrency:
  group: ci-python-docker-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install --no-cache-dir "ruff>=0.3.0"

      - name: Ruff lint
        run: ruff check --output-format=github .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short --junitxml=results.xml -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: results.xml
          retention-days: 30

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e362a7d2c83 # v6.18.0
        with:
          context: .
          push: false
          tags: github-sts:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
